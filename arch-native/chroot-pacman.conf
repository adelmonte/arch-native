#
# /etc/pacman.conf — forge build chroot
#
# Arch [core]/[extra] come first for a stable build base.
# Artix [system]/[world]/[galaxy] follow for Artix-specific build dependencies.
# The /usr/sbin packaging issue is handled by --sbindir=/usr/bin in artix-meson,
# not by repo priority — no need to put Artix first here.
#
[options]
CacheDir    = /var/cache/pacman/pkg/
HoldPkg     = pacman glibc
Architecture = auto
CheckSpace
ParallelDownloads = 5
DownloadUser = alpm
SigLevel          = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[system]
SigLevel = Required DatabaseOptional
Include = /etc/pacman.d/artix-mirrorlist

[world]
SigLevel = Required DatabaseOptional
Include = /etc/pacman.d/artix-mirrorlist

[galaxy]
SigLevel = Required DatabaseOptional
Include = /etc/pacman.d/artix-mirrorlist
