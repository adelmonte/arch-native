[arch-native]
# Repo name — used for the pacman database filename and PACKAGER field.
# The database will be at <repo_dir>/<repo_name>.db.tar.zst
repo_name = forge

# Target architecture
# "native" = let the compiler pick based on the build host (default, correct for local mode)
# Explicit value (e.g. "pantherlake") required for remote cross-optimization builds
march = native

# Mode: "local" (default) or "remote"
# local  — build on the same machine you run the packages on; reads the
#           local pacman DB directly, no manifest file or rsync needed.
#           march defaults to "native"; !check removed; target-cpu=native
#           added to RUSTFLAGS so Rust crates are also CPU-optimized.
# remote — dedicated build server; package list synced from desktop via
#           pkglist-export pacman hook → <manifest_path>
mode = local

# Distro: "arch" (default) or "artix"
# Controls Artix-specific chroot fixups (artix-meson, libelogind/elogind/libudev).
# Artix users: set to "artix" and optionally provide chroot_pacman_conf.
distro = arch

# Path to pacman.conf deployed into the chroot each startup.
# Artix users must supply their own (it differs from the standard Arch one).
# Default: look for /usr/share/arch-native/chroot-pacman.conf or
#          /etc/arch-native/chroot-pacman.conf
# chroot_pacman_conf = /etc/arch-native/chroot-pacman.conf

# Extra packages installed into the chroot after each upgrade.
# Defaults to "libelogind,libudev,elogind" when distro=artix; empty for arch.
# chroot_extra_packages = libelogind,libudev,elogind

# Paths — all default to /var/lib/arch-native/<subdir>
# Only set these if you need a non-standard layout.
# chroot_dir         = /var/lib/arch-native/chroots
# chroot_root        = /var/lib/arch-native/chroots/root
# repo_dir           = /var/lib/arch-native/repo
# repo_db            = /var/lib/arch-native/repo/forge.db.tar.zst
# pkgbuilds_dir      = /var/lib/arch-native/pkgbuilds
# makepkg_configs_dir = /var/lib/arch-native/makepkg-configs
# manifest_path      = /var/lib/arch-native/manifests/client.json
# gnupg_home         = /var/lib/arch-native/gnupg
# state_path         = /var/lib/arch-native/built.json
# pending_path       = /var/lib/arch-native/pending.json
# failed_path        = /var/lib/arch-native/failed.json
# log_dir            = /var/lib/arch-native/logs
# metrics_path       = /var/lib/arch-native/metrics.json
# in_progress_path   = /var/lib/arch-native/in_progress.json

# Intervals (seconds)
poll_interval = 300
upstream_check_interval = 3600

# Per-package build timeout (seconds). Kills genuinely hung builds.
# Firefox/thunderbird legitimately take 3h+; set high enough not to interrupt them.
# Set to 0 to disable. Default: 14400 (4 hours).
build_timeout = 14400

# Transient download failures (rate limits, SSL cert issues, connection resets)
# are re-queued automatically up to this many times before being moved to failed.
# Set to 0 to disable (always fail on download error).
download_retry_limit = 3

# Auto-prune stale package files from the repo dir.
# When a package is rebuilt with a new version, repo-add updates the database
# but doesn't delete the old .pkg.tar.zst file. Auto-pruning removes orphans
# (and their .sig files) immediately after each successful build.
# autoprune = true
#
# How many recent versions to retain per package (must be >= 1).
# Default: 1 (only the most recent version).
# autoprune_keep = 1

# Blacklist: packages that should never be rebuilt.
# Toolchain-critical packages are unsafe to rebuild with custom -march.
# AUR/binary packages have no upstream PKGBUILD.
blacklist = gcc,glibc,glib2,coreutils,linux-api-headers,binutils,ttf-*,otf-*,font-*

# LTO blacklist: packages where LTO causes build failures
lto_blacklist = llvm,rust

# When all keyserver key imports fail, retry the build with --skippgpcheck.
# Source hashes (sha256/sha512) are still verified; only the PGP signature on
# the source tarball is skipped. Packages built this way are flagged in built.json.
skip_pgp_on_import_failure = true

# Logging
log_level = INFO

# Repository resolution priority (left to right).
# Tier names can be anything; each non-local tier needs a <name>_source entry below.
# "local" is always available (patches in pkgbuilds/local/) and needs no source entry.
repo_priority = local,arch

# When a package exists in multiple tiers, which PKGBUILD wins?
#   priority (default) — first tier in repo_priority wins
#   highest            — the tier with the highest pkgver wins
# "highest" is safe for Artix+dinit installs because Artix-specific service
# units live in separate -dinit split packages, not in the base PKGBUILD.
# tier_version_select = priority

# Source definition for each tier. Three types are supported:
#   clone <url>   — git clone per package on demand ({pkgname} substituted in url)
#   monorepo      — walk pkgbuilds/<tier>/ directory; git-pulled each upstream check cycle
#   pkgctl        — use Arch devtools pkgctl (Arch Linux official repos only)
#
# Built-in defaults are applied when a known tier name has no explicit entry:
#   artix_source  = clone https://gitea.artixlinux.org/packages/{pkgname}.git
#   cachyos_source = monorepo
#   arch_source   = pkgctl
#
# Examples — add any tier you want:
# myfork_source = clone https://git.example.com/packages/{pkgname}.git
# mypkgs_source = monorepo

# Stall detection: packages that fail repeatedly are flagged as "stalled"
# and removed from automatic retry until cleared manually with buildbot retry.
# failed_stall_retries — stop retrying after this many consecutive failures (0=disable)
# failed_stall_days    — stop retrying after this many days since first failure (0=disable)
# failed_stall_retries = 5
# failed_stall_days = 7

# Build log retention (days)
log_retention_days = 7
